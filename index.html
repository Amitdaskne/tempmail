<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Amit TEMPmail</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- Material Symbols -->
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />

  <style>
    *{
      font-family: 'Space Grotesk', sans-serif;
    }

    body{
      overflow-x:hidden;
    }

    .no-scrollbar::-webkit-scrollbar{
      display:none;
    }

    .glass{
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.08);
    }

    .dark .glass{
      background: rgba(255,255,255,0.05);
    }

    @keyframes toastIn{
      from{
        transform:translateY(100px);
        opacity:0;
      }
      to{
        transform:translateY(0);
        opacity:1;
      }
    }

    @keyframes toastOut{
      from{
        transform:translateY(0);
        opacity:1;
      }
      to{
        transform:translateY(100px);
        opacity:0;
      }
    }

    .toast-in{
      animation: toastIn .4s ease forwards;
    }

    .toast-out{
      animation: toastOut .4s ease forwards;
    }

    @keyframes fadeSplash{
      to{
        opacity:0;
        visibility:hidden;
      }
    }

    .fade-splash{
      animation:fadeSplash .7s ease forwards;
    }

    .loader-bar{
      transition: width .3s ease;
    }

    .email-card:hover{
      transform:scale(1.01);
    }
  </style>
</head>

<body class="bg-gradient-to-br from-slate-100 to-white dark:from-[#0f172a] dark:to-black text-black dark:text-white transition-all duration-300">

  <!-- SPLASH -->
  <div id="splash"
    class="fixed inset-0 z-50 flex flex-col items-center justify-center bg-white dark:bg-black">

    <h1 class="text-4xl font-bold mb-3 tracking-wide">
      Amit TEMPmail
    </h1>

    <p class="text-gray-500 dark:text-gray-400 mb-10">
      No Login, No Signup, Just Privacy.
    </p>

    <div class="w-72 h-3 bg-gray-200 dark:bg-gray-800 rounded-full overflow-hidden">
      <div id="progressBar"
        class="loader-bar h-full bg-black dark:bg-white rounded-full w-0">
      </div>
    </div>
  </div>

  <!-- APP -->
  <div class="max-w-md mx-auto min-h-screen p-4">

    <!-- HEADER -->
    <div class="flex items-center justify-between mb-5 pt-2">
      <div></div>

      <h1 class="text-2xl font-bold">
        Amit TEMPmail
      </h1>

      <button id="themeBtn"
        class="w-10 h-10 rounded-full glass flex items-center justify-center">
        <span class="material-symbols-outlined">
          dark_mode
        </span>
      </button>
    </div>

    <!-- ACTIONS -->
    <div class="grid grid-cols-2 gap-3 mb-4">
      <button id="newMailBtn"
        class="bg-black dark:bg-white dark:text-black text-white py-3 rounded-2xl font-semibold shadow-lg flex items-center justify-center gap-2">

        <span class="material-symbols-outlined">refresh</span>
        Change Mail
      </button>

      <button id="deleteBtn"
        class="bg-red-500 text-white py-3 rounded-2xl font-semibold shadow-lg flex items-center justify-center gap-2">

        <span class="material-symbols-outlined">delete</span>
        Delete Mail
      </button>
    </div>

    <!-- EMAIL -->
    <div class="glass rounded-3xl p-4 mb-4 border border-white/10">

      <div class="flex items-start justify-between gap-2">
        <div class="overflow-hidden">
          <p class="text-sm opacity-70 mb-1">
            Temporary Email
          </p>

          <p id="emailText"
            class="font-semibold break-all text-lg">
            Loading...
          </p>
        </div>

        <button id="copyBtn"
          class="bg-blue-500 text-white px-4 py-2 rounded-xl text-sm">
          Copy
        </button>
      </div>
    </div>

    <!-- TIMER -->
    <div class="glass rounded-3xl p-4 mb-4 border border-white/10">

      <div class="flex items-center justify-between">

        <div>
          <p class="opacity-70 text-sm mb-1">
            Email Lifetime
          </p>

          <h2 id="timer"
            class="text-3xl font-bold">
            10:00
          </h2>
        </div>

        <button id="extendBtn"
          class="bg-green-500 px-4 py-2 rounded-xl text-white">
          Extend
        </button>

      </div>
    </div>

    <!-- REFRESH -->
    <button id="refreshBtn"
      class="w-full mb-4 bg-indigo-500 text-white py-3 rounded-2xl font-semibold flex items-center justify-center gap-2">

      <span class="material-symbols-outlined">
        sync
      </span>

      Refresh Inbox
    </button>

    <!-- INBOX -->
    <div class="mb-20">

      <div class="flex items-center justify-between mb-3">
        <h2 class="text-xl font-bold">
          Inbox
        </h2>

        <p id="emailCount"
          class="opacity-70 text-sm">
          0 Emails
        </p>
      </div>

      <div id="emailList"
        class="space-y-3 no-scrollbar">
      </div>

      <!-- EMPTY -->
      <div id="emptyState"
        class="text-center py-20 opacity-70">

        <span class="material-symbols-outlined text-7xl mb-3">
          mail
        </span>

        <p class="text-lg">
          Your inbox is empty
        </p>

        <p class="text-sm mt-1">
          Waiting for incoming emails...
        </p>
      </div>
    </div>

  </div>

  <!-- EMAIL VIEW -->
  <div id="emailView"
    class="fixed inset-0 bg-white dark:bg-black z-40 hidden overflow-y-auto">

    <div class="max-w-md mx-auto min-h-screen p-4">

      <button id="backBtn"
        class="mb-5 w-12 h-12 rounded-full glass flex items-center justify-center">

        <span class="material-symbols-outlined">
          arrow_back
        </span>
      </button>

      <div class="glass rounded-3xl p-5 border border-white/10">

        <div class="flex items-center gap-3 mb-5">

          <div id="avatar"
            class="w-14 h-14 rounded-full bg-black dark:bg-white text-white dark:text-black flex items-center justify-center text-2xl font-bold">
            A
          </div>

          <div>
            <h2 id="detailSender"
              class="font-bold text-lg">
            </h2>

            <p id="detailTime"
              class="opacity-70 text-sm">
            </p>
          </div>
        </div>

        <h1 id="detailSubject"
          class="text-2xl font-bold mb-5">
        </h1>

        <div id="detailBody"
          class="prose dark:prose-invert max-w-none break-words">
        </div>

        <button id="deleteMessageBtn"
          class="mt-8 w-full bg-red-500 text-white py-3 rounded-2xl font-semibold">
          Delete Message
        </button>

      </div>

    </div>
  </div>

  <!-- TOAST -->
  <div id="toastContainer"
    class="fixed bottom-6 left-1/2 -translate-x-1/2 z-50">
  </div>

  <script type="module">

    const API = "https://api.mail.tm";

    let token = "";
    let currentEmail = "";
    let currentPassword = "";
    let accountId = "";
    let mailExpiry = 0;

    let messages = [];
    let timerSeconds = 600;
    let timerInterval;
    let inboxInterval;

    const emailText = document.getElementById("emailText");
    const emailList = document.getElementById("emailList");
    const emptyState = document.getElementById("emptyState");
    const timer = document.getElementById("timer");
    const emailCount = document.getElementById("emailCount");

    // SPLASH
    let progress = 0;

    const splashInterval = setInterval(() => {

      progress += 10;

      document.getElementById("progressBar")
        .style.width = progress + "%";

      if(progress >= 100){

        clearInterval(splashInterval);

        setTimeout(() => {
          document.getElementById("splash")
            .classList.add("fade-splash");
        },400);

      }

    },180);

    // THEME
    function applyTheme(theme){

      if(theme === "dark"){
        document.documentElement.classList.add("dark");

        document.getElementById("themeBtn")
          .innerHTML = `
          <span class="material-symbols-outlined">
            light_mode
          </span>`;
      }
      else{

        document.documentElement.classList.remove("dark");

        document.getElementById("themeBtn")
          .innerHTML = `
          <span class="material-symbols-outlined">
            dark_mode
          </span>`;
      }
    }

    const savedTheme = localStorage.getItem("theme") || "light";

    applyTheme(savedTheme);

    document.getElementById("themeBtn")
      .onclick = () => {

        const isDark = document.documentElement
          .classList.contains("dark");

        const next = isDark ? "light" : "dark";

        localStorage.setItem("theme", next);

        applyTheme(next);
      };

    // TOAST
    function showToast(message){

      const container = document.getElementById("toastContainer");

      const toast = document.createElement("div");

      toast.className =
        "toast-in bg-black dark:bg-white dark:text-black text-white px-5 py-3 rounded-2xl shadow-2xl mb-2";

      toast.innerText = message;

      container.appendChild(toast);

      setTimeout(() => {

        toast.classList.remove("toast-in");
        toast.classList.add("toast-out");

        setTimeout(() => {
          toast.remove();
        },400);

      },3000);
    }

    // FORMAT TIME
    function formatTimer(seconds){

      const mins = Math.floor(seconds / 60)
        .toString()
        .padStart(2,"0");

      const secs = (seconds % 60)
        .toString()
        .padStart(2,"0");

      return `${mins}:${secs}`;
    }

    // TIMER
    function startTimer(){

      clearInterval(timerInterval);

      const savedExpiry = localStorage.getItem("tempmail_expiry");

      if(savedExpiry){
        timerSeconds = Math.max(0, Math.floor((Number(savedExpiry) - Date.now()) / 1000));
      }else{
        timerSeconds = 600;
        localStorage.setItem("tempmail_expiry", Date.now() + (timerSeconds*1000));
      }

      timer.textContent = formatTimer(timerSeconds);

      timerInterval = setInterval(() => {

        timerSeconds--;

        timer.textContent = formatTimer(timerSeconds);

        if(timerSeconds <= 0){

          clearInterval(timerInterval);

          showToast("Timer expired!");

        }

      },1000);
    }

    document.getElementById("extendBtn")
      .onclick = () => {

        timerSeconds = 172800;
        localStorage.setItem("tempmail_expiry", Date.now() + (timerSeconds*1000));

        showToast("Timer Extended");
      };

    // FETCH
    async function fetchWithTimeout(url, options = {}, timeout = 10000){

      const controller = new AbortController();

      const id = setTimeout(() => controller.abort(), timeout);

      const response = await fetch(url,{
        ...options,
        signal: controller.signal
      });

      clearTimeout(id);

      return response;
    }

    // GET NEW EMAIL
    async function getNewEmail(){

      try{

        showToast("Generating new email...");

        const domainsRes = await fetch(`${API}/domains`);

        const domainsData = await domainsRes.json();

        const domain = domainsData["hydra:member"][0].domain;

        const randomName =
          "amit" + Math.random().toString(36).substring(2,10);

        currentEmail = `${randomName}@${domain}`;

        currentPassword =
          Math.random().toString(36).substring(2,12);

        // CREATE ACCOUNT
        await fetch(`${API}/accounts`,{
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            address: currentEmail,
            password: currentPassword
          })
        });

        // LOGIN
        const tokenRes = await fetch(`${API}/token`,{
          method:"POST",
          headers:{
            "Content-Type":"application/json"
          },
          body:JSON.stringify({
            address: currentEmail,
            password: currentPassword
          })
        });

        const tokenData = await tokenRes.json();

        token = tokenData.token;

        emailText.textContent = currentEmail;

        localStorage.setItem("tempmail_email", currentEmail);
        localStorage.setItem("tempmail_password", currentPassword);
        localStorage.setItem("tempmail_token", token);

        showToast("New email generated!");

        checkInbox();

      }
      catch(err){

        console.log(err);

        showToast("Failed to generate email");

      }
    }

    // CHECK INBOX
    async function checkInbox(){

      try{

        const res = await fetchWithTimeout(
          `${API}/messages`,
          {
            headers:{
              Authorization:`Bearer ${token}`
            }
          }
        );

        const data = await res.json();

        messages = data["hydra:member"] || [];

        renderEmails();

      }
      catch(err){

        console.log(err);
      }
    }

    // RENDER EMAILS
    function renderEmails(){

      emailList.innerHTML = "";

      emailCount.innerText =
        `${messages.length} Emails`;

      if(messages.length === 0){

        emptyState.style.display = "block";

        return;
      }

      emptyState.style.display = "none";

      messages.forEach(mail => {

        const div = document.createElement("div");

        div.className =
          "email-card glass rounded-3xl p-4 border border-white/10 transition-all duration-300 cursor-pointer";

        div.innerHTML = `
          <div class="flex items-start justify-between gap-3">

            <div class="flex gap-3 flex-1">

              <div class="w-12 h-12 rounded-full bg-black dark:bg-white text-white dark:text-black flex items-center justify-center font-bold">
                ${mail.from?.name?.charAt(0)?.toUpperCase() || "?"}
              </div>

              <div class="flex-1 overflow-hidden">

                <h3 class="font-bold truncate">
                  ${escapeHTML(mail.subject || "No Subject")}
                </h3>

                <p class="text-sm opacity-70 truncate">
                  ${escapeHTML(mail.from?.address || "")}
                </p>

                <p class="text-sm opacity-60 truncate mt-1">
                  ${escapeHTML(mail.intro || "")}
                </p>

              </div>
            </div>

          </div>
        `;

        div.onclick = () => openEmail(mail.id);

        emailList.appendChild(div);

      });

    }

    // OPEN EMAIL
    async function openEmail(id){

      try{

        const res = await fetch(
          `${API}/messages/${id}`,
          {
            headers:{
              Authorization:`Bearer ${token}`
            }
          }
        );

        const data = await res.json();

        document.getElementById("emailView")
          .classList.remove("hidden");

        document.getElementById("detailSender")
          .innerText = data.from.address;

        document.getElementById("detailSubject")
          .innerText = data.subject || "No Subject";

        document.getElementById("detailTime")
          .innerText = new Date(data.createdAt)
          .toLocaleString();

        document.getElementById("avatar")
          .innerText =
          data.from.address.charAt(0).toUpperCase();

        document.getElementById("detailBody")
          .innerHTML =
          data.html?.[0] ||
          `<pre>${escapeHTML(data.text || "")}</pre>`;

      }
      catch(err){

        console.log(err);

        showToast("Failed to open email");

      }

    }

    // ESCAPE
    function escapeHTML(str){

      const div = document.createElement("div");

      div.innerText = str;

      return div.innerHTML;
    }

    // COPY
    document.getElementById("copyBtn")
      .onclick = async () => {

        await navigator.clipboard.writeText(currentEmail);

        showToast("Copied!");
      };

    // REFRESH
    document.getElementById("refreshBtn")
      .onclick = () => {

        checkInbox();

        showToast("Inbox refreshed");
      };

    // DELETE MAIL
    document.getElementById("deleteBtn")
      .onclick = async () => {

        await getNewEmail();

        showToast("Mailbox deleted");
      };

    // NEW MAIL
    document.getElementById("newMailBtn")
      .onclick = async () => {

        await getNewEmail();
      };

    // BACK
    document.getElementById("backBtn")
      .onclick = () => {

        document.getElementById("emailView")
          .classList.add("hidden");
      };

    // DELETE MESSAGE
    document.getElementById("deleteMessageBtn")
      .onclick = () => {

        document.getElementById("emailView")
          .classList.add("hidden");

        showToast("Message removed locally");
      };

    // INIT
    async function initApp(){

      const savedEmail = localStorage.getItem("tempmail_email");
      const savedPassword = localStorage.getItem("tempmail_password");
      const savedToken = localStorage.getItem("tempmail_token");

      if(savedEmail && savedPassword && savedToken){

        currentEmail = savedEmail;
        currentPassword = savedPassword;
        token = savedToken;

        emailText.textContent = currentEmail;

        checkInbox();

      }else{

        await getNewEmail();

      }

      startTimer();

      inboxInterval = setInterval(() => {
        checkInbox();
      },10000);
    }

    initApp();

  </script>

</body>
</html>
